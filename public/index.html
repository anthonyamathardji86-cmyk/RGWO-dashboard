<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RGWO portal</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; overflow-x: hidden; height: auto; }
        body.dashboard-locked { overflow: hidden; height: 100vh; }
        .glass-card { background: rgba(255,255,255, 0.95); backdrop-filter: blur(10px); border:1px solid rgba(255,255,255, 0.5); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1); }
        #dashboard-lock { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255, 0.6); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); z-index: 60; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease, visibility 0.5s ease; }
        .dashboard-unlocked #dashboard-lock { opacity: 0; visibility: hidden; pointer-events: none; }
        .tab-btn { transition: all 0.3s ease; }
        .tab-active { background: #1e293b; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-inactive { background: #e2e8f0; color: #64748b; }
        .tab-inactive:hover { background: #cbd5e1; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); z-index: 100; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease; }
        .modal-content { background: white; width: 90%; max-width: 500px; border-radius: 20px; padding: 30px; transform: scale(0.9); transition: transform 0.3s ease; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); max-height: 90vh; overflow-y: auto; }
        .modal-active .modal-overlay { display: flex; opacity: 1; }
        .modal-active .modal-content { transform: scale(1); }
        .form-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; transition: border-color 0.3s; font-family: 'Poppins', sans-serif; }
        .form-input:focus { border-color: #2563EB; }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: white; padding: 15px 20px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-left: 4px solid #2563EB; display: flex; align-items: center; gap: 12px; animation: slideIn 0.3s ease forwards; min-width: 300px; }
        .toast.error { border-left-color: #EF4444; }
        .toast.success { border-left-color: #10B981; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(20px); } }
    </style>
</head>
<body class="text-gray-800 antialiased dashboard-locked">

    <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-8 rounded-lg overflow-hidden shadow-lg shadow-blue-500/30">
                        <img src="logo.png" alt="RGWO Logo" class="w-full h-full object-contain">
                    </div>
                    <h1 class="text-xl font-bold text-gray-900 tracking-tight">RGWO Portal</h1>
                </div>
                <div class="hidden md:flex items-center gap-2">
                    <a href="https://drive.google.com/drive/folders/1FQm8Ryy0rz9rbl1HX01P8fR__GQ5eP-X" target="_blank" rel="noopener noreferrer" class="px-3 py-1.5 text-sm font-medium text-blue-600 hover:bg-blue-50 rounded-md transition">Documenten</a>
                    <a href="https://drive.google.com/drive/folders/19LNU-H9n_3nrqEL7IEDicguTPIdFTNlI" target="_blank" rel="noopener noreferrer" class="px-3 py-1.5 text-sm font-medium text-teal-600 hover:bg-teal-50 rounded-md transition">Bekendmakingen</a>
                    <a href="https://drive.google.com/drive/folders/1xuNl-y80yPm3xovyPH-c2xDjwzIrOYWB" target="_blank" rel="noopener noreferrer" class="px-3 py-1.5 text-sm font-medium text-purple-600 hover:bg-purple-50 rounded-md transition">Projecten</a>
                    <a href="https://drive.google.com/drive/folders/1musEr4470HmG22Z3KIW4VM9_H_g-G1ZR" target="_blank" rel="noopener noreferrer" class="px-3 py-1.5 text-sm font-medium text-amber-600 hover:bg-amber-50 rounded-md transition">Formulieren</a>
                    <button onclick="toggleModal(true, 'loanModal')" class="px-4 py-1.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-md transition shadow-sm">Leningaanvraag</button>
                    <button onclick="logout()" class="px-3 py-1.5 text-sm font-medium text-red-500 hover:bg-red-50 rounded-md transition"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
                </div>
                <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="md:hidden p-2 rounded-lg hover:bg-gray-100 transition">
                    <i class="fa-solid fa-bars text-gray-600 text-xl"></i>
                </button>
            </div>
            <div id="mobile-menu" class="hidden md:hidden pb-4 border-t border-gray-100 mt-2 pt-4 flex flex-col gap-2">
                <a href="https://drive.google.com/drive/folders/1FQm8Ryy0rz9rbl1HX01P8fR__GQ5eP-X" target="_blank" rel="noopener noreferrer" class="block px-3 py-2 text-sm font-medium text-blue-600 hover:bg-blue-50 rounded-md transition"><i class="fa-solid fa-folder-open w-5 mr-2"></i> Documenten</a>
                <a href="https://drive.google.com/drive/folders/19LNU-H9n_3nrqEL7IEDicguTPIdFTNlI" target="_blank" rel="noopener noreferrer" class="block px-3 py-2 text-sm font-medium text-teal-600 hover:bg-teal-50 rounded-md transition"><i class="fa-solid fa-bullhorn w-5 mr-2"></i> Bekendmakingen</a>
                <a href="https://drive.google.com/drive/folders/1xuNl-y80yPm3xovyPH-c2xDjwzIrOYWB" target="_blank" rel="noopener noreferrer" class="block px-3 py-2 text-sm font-medium text-purple-600 hover:bg-purple-50 rounded-md transition"><i class="fa-solid fa-diagram-project w-5 mr-2"></i> Projecten</a>
                <a href="https://drive.google.com/drive/folders/1musEr4470HmG22Z3KIW4VM9_H_g-G1ZR" target="_blank" rel="noopener noreferrer" class="block px-3 py-2 text-sm font-medium text-amber-600 hover:bg-amber-50 rounded-md transition"><i class="fa-solid fa-clipboard-list w-5 mr-2"></i> Formulieren</a>
                <button onclick="toggleModal(true, 'loanModal')" class="w-full text-left px-3 py-2 text-sm font-bold text-blue-600 hover:bg-blue-50 rounded-md transition"><i class="fa-solid fa-hand-holding-dollar w-5 mr-2"></i> Leningaanvraag</button>
                <button onclick="logout()" class="w-full text-left px-3 py-2 text-sm font-medium text-red-500 hover:bg-red-50 rounded-md transition"><i class="fa-solid fa-arrow-right-from-bracket w-5 mr-2"></i> Logout</button>
            </div>
        </div>
    </header>

    <!-- LOCK SCREEN -->
    <div id="dashboard-lock">
        <div class="glass-card p-10 rounded-3xl text-center max-w-md w-full shadow-2xl border-t border-white/50">
            <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6 text-blue-600">
                <i class="fa-solid fa-shield-halved text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Leden Portaal</h2>
            <p class="text-gray-500 mb-8 text-sm">Log in met je Telegram account om toegang te krijgen tot het dashboard.</p>
            <div id="telegram-login-container" class="flex justify-center mb-4">
                <script src="https://telegram.org/js/telegram-widget.js?22" data-telegram-login="rgwo_loan_bot" data-size="large" data-radius="10" data-onauth="onTelegramAuth(user)" data-request-access="write"></script>
            </div>
            <p id="auth-error" class="text-red-500 text-sm mt-4 hidden">Je bent geen lid van de RGWO Telegram groep.</p>
        </div>
    </div>

    <!-- PROFILE SETUP MODAL -->
    <div id="profileModal">
        <div class="modal-overlay">
            <div class="modal-content">
                <div class="mb-6">
                    <h2 class="text-2xl font-bold text-gray-900">Welkom, <span id="welcome-name">Lid</span>!</h2>
                    <p class="text-sm text-gray-500">Vul uw officiële gegevens in.</p>
                </div>
                <form onsubmit="submitProfile(event)">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Volledige Naam</label>
                    <input type="text" id="profile-naam" class="form-input" placeholder="v.b. Anthony Amathardji" required>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Badge nummer</label>
                    <input type="text" id="profile-badge" class="form-input" placeholder="v.b. 7224" required>
                    <label class="block text-sm font-semibold
