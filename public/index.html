<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>RGWO portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; overflow-x: hidden; height: auto; }
        body.dashboard-locked { overflow: hidden; height: 100vh; }
        .glass-card { background: rgba(255,255,255, 0.95); backdrop-filter: blur(10px); border:1px solid rgba(255,255,255, 0.5); box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.1); }
        #dashboard-lock { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255, 0.6); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); z-index: 60; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease, visibility 0.5s ease; }
        body.dashboard-locked #admin-section, body.dashboard-locked header, body.dashboard-locked main { display: none !important; }
        .dashboard-unlocked #dashboard-lock { opacity: 0; visibility: hidden; pointer-events: none; }
        .form-input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; transition: border-color 0.3s; }
        .form-input:focus { border-color: #2563EB; }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 200; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: white; padding: 15px 20px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); border-left: 4px solid #2563EB; display: flex; align-items: center; gap: 12px; animation: slideIn 0.3s ease forwards; min-width: 300px; }
        .toast.error { border-left-color: #EF4444; }
        .toast.success { border-left-color: #10B981; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(20px); } }
    </style>
</head>
<body class="text-gray-800 antialiased dashboard-locked">
    <!-- HEADER -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-8 rounded-lg overflow-hidden shadow-lg shadow-blue-500/30">
                        <img src="logo.png" alt="RGWO Logo" class="w-full h-full object-contain">
                    </div>
                    <h1 class="text-xl font-bold text-gray-900 tracking-tight">RGWO Portal</h1>
                </div>
                <div class="hidden md:flex items-center gap-2">
                    <button class="px-3 py-1.5 text-sm font-medium text-blue-600 rounded-md">Documenten</button>
                    <button class="px-3 py-1.5 text-sm font-medium text-teal-600 rounded-md">Bekendmakingen</button>
                    <button class="px-3 py-1.5 text-sm font-medium text-purple-600 rounded-md">Projecten</button>
                    <button class="px-3 py-1.5 text-sm font-medium text-amber-600 rounded-md">Formulieren</button>
                    <button onclick="toggleModal(true)" class="px-4 py-1.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-md shadow-sm">Leningaanvraag</button>
                    <button onclick="logout()" class="px-3 py-1.5 text-sm font-medium text-red-500 rounded-md"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
                </div>
            </div>
        </div>
    </header>

    <!-- LOCK SCREEN -->
    <div id="dashboard-lock">
        <div class="glass-card p-10 rounded-3xl text-center max-w-md w-full shadow-2xl border-t border-white/50">
            <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6 text-blue-600">
                <i class="fa-solid fa-shield-halved text-3xl"></i>
            </div>
            
            <div id="login-view">
                <h2 class="text-2xl font-bold text-gray-900 mb-2">Leden Portaal</h2>
                <p class="text-gray-500 mb-8 text-sm">Log in met je Telegram account om toegang te krijgen tot het dashboard.</p>
                <div class="flex justify-center">
                    <script async src="https://telegram.org" data-telegram-login="rgwo_loan_bot" data-size="large" data-onauth="onTelegramAuth(user)" data-request-access="write"></script>
                </div>
            </div>

            <div id="onboarding-view" class="hidden text-left">
                <h2 class="text-2xl font-bold text-gray-900 mb-2 text-center">Gegevens Aanvullen</h2>
                <p class="text-gray-500 mb-6 text-sm text-center">Welkom <span id="tg-display-handle" class="font-bold text-blue-600"></span>! Vul je gegevens aan.</p>
                <input type="text" id="setup-naam" placeholder="Voor- en Achternaam" class="form-input">
                <input type="text" id="setup-badge" placeholder="Badge Nummer" class="form-input">
                <input type="text" id="setup-afdeling" placeholder="Afdeling" class="form-input">
                <button onclick="submitRealProfile()" class="w-full py-3 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-md">Opslaan & Openen</button>
            </div>
        </div>
    </div>
        <!-- MAIN INTERFACE TABLE -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
        <div id="admin-section" class="mt-4 hidden">
            <div class="glass-card rounded-2xl p-6 bg-white shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-lg font-bold text-gray-900">Geregistreerde RGWO Leden</h3>
                    <button onclick="loadAdminMembers()" class="px-3 py-1.5 text-xs font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 rounded-md"><i class="fa-solid fa-rotate"></i> Vernieuwen</button>
                </div>
                <table class="min-w-full divide-y divide-gray-200 text-left text-sm">
                    <thead class="bg-gray-50 text-gray-500 text-xs">
                        <tr>
                            <th class="px-6 py-3 font-semibold">Naam</th>
                            <th class="px-6 py-3 font-semibold">Badge</th>
                            <th class="px-6 py-3 font-semibold">Afdeling</th>
                            <th class="px-6 py-3 font-semibold">Telegram Handle</th>
                            <th class="px-6 py-3 font-semibold">Telegram ID</th>
                        </tr>
                    </thead>
                    <tbody id="admin-members-table-body" class="divide-y divide-gray-200 bg-white">
                        <tr><td colspan="5" class="px-6 py-4 text-center text-gray-400 italic">Ledenlijst laadt...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script>
        let globalTelegramUser = null;
        async function checkActiveSession() {
            try {
                const response = await fetch('/api/me');
                const data = await response.json();
                if (data.loggedIn) {
                    if (data.needsOnboarding) {
                        document.getElementById('login-view').className = 'hidden';
                        document.getElementById('onboarding-view').className = 'block';
                    } else { unlockDashboard(); }
                }
            } catch (err) { console.error(err); }
        }
        window.addEventListener('DOMContentLoaded', checkActiveSession);

        async function onTelegramAuth(user) {
            if (!user) return;
            globalTelegramUser = user;
            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(user)
                });
                const resData = await response.json();
                if (resData.success) {
                    if (resData.needsOnboarding) {
                        document.getElementById('login-view').className = 'hidden';
                        document.getElementById('onboarding-view').className = 'block';
                        document.getElementById('tg-display-handle').innerText = `@${user.username || user.first_name}`;
                    } else { unlockDashboard(); }
                }
            } catch (err) { console.error(err); }
        }

        async function submitRealProfile() {
            const naam = document.getElementById('setup-naam').value.trim();
            const badge = document.getElementById('setup-badge').value.trim();
            const afdeling = document.getElementById('setup-afdeling').value.trim();
            if (!naam || !badge || !afdeling) return;
            try {
                const response = await fetch('/api/profile/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ naam, badge, afdeling })
                });
                const resData = await response.json();
                if (resData.success) { unlockDashboard(); }
            } catch (err) { console.error(err); }
        }

        function unlockDashboard() {
            document.body.classList.remove('dashboard-locked');
            document.documentElement.classList.add('dashboard-unlocked');
            document.getElementById('admin-section').classList.remove('hidden');
            loadAdminMembers();
        }

        async function loadAdminMembers() {
            const tbody = document.getElementById('admin-members-table-body');
            try {
                const response = await fetch('/api/admin/members');
                const data = await response.json();
                if (data.success) {
                    tbody.innerHTML = data.members.map(m => `
                        <tr class="border-b text-sm">
                            <td class="px-6 py-4 font-semibold">${m.naam || 'Incompleet'}</td>
                            <td class="px-6 py-4">${m.badge || '-'}</td>
                            <td class="px-6 py-4">${m.afdeling || '-'}</td>
                            <td class="px-6 py-4">@${m.telegram_username || ''}</td>
                            <td class="px-6 py-4 text-gray-400 font-mono text-xs">${m.telegram_id}</td>
                        </tr>
                    `).join('');
                }
            } catch (err) { console.error(err); }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.reload();
        }
        function toggleModal(show) {}
    </script>
</body>
</html>
